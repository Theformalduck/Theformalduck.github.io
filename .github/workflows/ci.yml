name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Type-check, lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` runs the `postinstall` script (prisma generate) automatically.
      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # Build with placeholder env so the bundle compiles. No real DB connection
      # happens at build time (DB queries are guarded / pages are dynamic), so a
      # dummy DATABASE_URL is enough for Prisma's client + Next's page collection.
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          AUTH_SECRET: ci-build-only-secret-not-used-at-runtime
          AUTH_TRUST_HOST: "true"
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
